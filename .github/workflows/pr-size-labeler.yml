name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-pr-size:
    name: Label PR Size
    runs-on: ubuntu-latest

    steps:
      - name: Apply size label
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const labels = [
              { name: 'size: small', color: '0e8a16', description: 'Small pull request' },
              { name: 'size: medium', color: 'fbca04', description: 'Medium pull request' },
              { name: 'size: large', color: 'd93f0b', description: 'Large pull request' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: label.name,
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    ...label,
                  });
                } else {
                  throw error;
                }
              }
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number,
                per_page: 100,
              }
            );

            const totalChanges = files.reduce(
              (sum, file) => sum + file.additions + file.deletions,
              0
            );

            let selectedLabel = 'size: large';
            if (totalChanges < 100) {
              selectedLabel = 'size: small';
            } else if (totalChanges < 500) {
              selectedLabel = 'size: medium';
            }

            const existingSizeLabels = context.payload.pull_request.labels
              .map((label) => label.name)
              .filter((name) => labels.some((label) => label.name === name));

            for (const labelName of existingSizeLabels) {
              if (labelName !== selectedLabel) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pull_number,
                  name: labelName,
                }).catch(() => {});
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: [selectedLabel],
            });
